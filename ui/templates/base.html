<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Job Hunt Agent{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f5f5; color: #222; }
    a { color: #0070f3; text-decoration: none; }
    a:hover { text-decoration: underline; }

    nav { background: #111; color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 24px; }
    nav .brand { font-weight: 700; font-size: 1.1rem; color: #fff; }
    nav a { color: #ccc; font-size: 0.9rem; }
    nav a:hover { color: #fff; text-decoration: none; }

    .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }

    .flash { padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; font-size: 0.9rem; }
    .flash.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .flash.info    { background: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }
    .flash.error   { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

    .stats { display: flex; gap: 16px; margin-bottom: 28px; flex-wrap: wrap; }
    .stat-card { background: #fff; border-radius: 8px; padding: 16px 24px; flex: 1; min-width: 140px;
                 box-shadow: 0 1px 4px rgba(0,0,0,.08); text-align: center; }
    .stat-card .num { font-size: 2rem; font-weight: 700; color: #0070f3; }
    .stat-card .label { font-size: 0.8rem; color: #666; margin-top: 4px; }

    .card { background: #fff; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.08); margin-bottom: 16px; }
    .card-header { padding: 16px 20px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: flex-start; }
    .card-body { padding: 16px 20px; }

    .badge { display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.75rem; font-weight: 600; }
    .badge-blue   { background: #e0f0ff; color: #0070f3; }
    .badge-green  { background: #d4edda; color: #155724; }
    .badge-gray   { background: #e9ecef; color: #555; }
    .badge-orange { background: #fff3cd; color: #856404; }

    .btn { display: inline-block; padding: 8px 18px; border-radius: 6px; font-size: 0.85rem; font-weight: 600;
           cursor: pointer; border: none; transition: opacity .15s; }
    .btn:hover { opacity: .85; text-decoration: none; }
    .btn-primary  { background: #0070f3; color: #fff; }
    .btn-success  { background: #28a745; color: #fff; }
    .btn-danger   { background: #dc3545; color: #fff; }
    .btn-outline  { background: transparent; border: 1px solid #ccc; color: #444; }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    h2 { font-size: 1.1rem; font-weight: 600; }
    h3 { font-size: 1rem; font-weight: 600; }

    .text-muted { color: #666; font-size: 0.85rem; }
    .mt-2 { margin-top: 8px; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .flex { display: flex; }
    .gap-2 { gap: 8px; }
    .gap-3 { gap: 12px; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>
  <nav>
    <span class="brand">🤖 Job Hunt Agent</span>
    <a href="/">Dashboard</a>
    <a href="/submitted">Submitted</a>
  </nav>

  <div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash {{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
